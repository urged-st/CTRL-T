<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CTRL-T</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<div id="bg-layer"></div>

	<div class="grid">

		<header class="bar bar-top">
			<span class="tag">CTRL+T</span>
			<div class="modes" role="group" aria-label="background mode">
				<button class="mode-btn active" data-mode="block">[BLOCK]</button>
				<button class="mode-btn" data-mode="apod">[APOD]</button>
				<button class="mode-btn" data-mode="library">[NASA.LIB]</button>
			</div>
			<span class="tag" id="date-tag">--/--/----</span>
		</header>

		<main class="slab">
			<div class="clock" id="clock">00:00</div>
			<div class="clock-sub" id="clock-seconds">00</div>
		</main>

		<section class="block search-block">
			<span class="label">[SEARCH]</span>
			<form id="search-form" autocomplete="off">
				<input type="text" id="search-input" placeholder="TYPE AND HIT ENTER" aria-label="search">
			</form>
		</section>

		<section class="block links-block">
			<span class="label">[LINKS]</span>
			<div class="links" id="links-list"></div>
			<form id="link-form" class="link-form hidden">
				<input type="text" id="link-label-input" placeholder="LABEL" maxlength="12">
				<input type="text" id="link-url-input" placeholder="URL">
				<button type="submit">SAVE</button>
			</form>
			<button id="add-link" class="add-link-btn">+ ADD</button>
		</section>

		<footer class="bar bar-bottom" id="info-strip">
			<span id="info-text">MODE: BLOCK — NO SOURCE DATA</span>
		</footer>

	</div>

	<script src="script.js"></script>
</body>
</html>
